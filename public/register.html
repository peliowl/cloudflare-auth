<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - Cloudflare Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles/common.css">
    <script src="/scripts/alert.js"></script>
</head>
<body class="m-body flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-semibold text-slate-900 tracking-tight">创建账号</h1>
            <p class="text-sm text-slate-400 mt-2">注册一个新账号</p>
        </div>

        <div class="m-card">
            <form id="register-form" class="space-y-6" novalidate>
                <div>
                    <label for="username" class="m-label">用户名</label>
                    <input type="text" id="username" name="username" required
                        class="m-input" autocomplete="username"
                        placeholder="选择一个用户名">
                </div>
                <div>
                    <label for="email" class="m-label">邮箱</label>
                    <input type="email" id="email" name="email" required
                        class="m-input" autocomplete="email"
                        placeholder="name@example.com">
                </div>
                <div>
                    <label for="password" class="m-label">密码</label>
                    <input type="password" id="password" name="password" required minlength="8"
                        class="m-input" autocomplete="new-password"
                        placeholder="至少 8 位字符">
                </div>
                <div>
                    <label for="confirm-password" class="m-label">确认密码</label>
                    <input type="password" id="confirm-password" name="confirm-password" required
                        class="m-input" autocomplete="new-password"
                        placeholder="再次输入密码">
                </div>
                <div class="pt-2">
                    <button type="submit" id="submit-btn" class="m-button-primary">注册</button>
                </div>
            </form>

            <div class="m-divider"><span>或</span></div>

            <div class="space-y-3">
                <a href="/auth/oauth/google" class="m-button-outline">
                    <svg class="w-4 h-4" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </a>
            </div>
        </div>

        <p class="mt-8 text-center text-sm text-slate-400">
            已有账号？<a href="/login.html" class="m-link">登录</a>
        </p>
    </div>

    <script>
        // 已登录用户重定向到首页
        if (localStorage.getItem('access_token')) {
            window.location.replace('/');
            throw new Error('redirect');
        }

        const form = document.getElementById('register-form');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                showAlert('两次输入的密码不一致', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '注册中...';

            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    let msg = '注册失败，请稍后重试';
                    if (typeof data.detail === 'string') {
                        msg = data.detail;
                    } else if (Array.isArray(data.detail)) {
                        msg = data.detail.map(e => e.msg || e.message || JSON.stringify(e)).join('; ');
                    }
                    showAlert(msg, 'error');
                    return;
                }

                showAlert('注册成功，即将跳转到登录页面', 'success');
                setTimeout(function() { window.location.href = '/login.html'; }, 1500);
            } catch (err) {
                showAlert('网络错误，请检查连接后重试', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '注册';
            }
        });
    </script>
</body>
</html>
