<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - Cloudflare Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles/common.css">
    <script src="/scripts/alert.js"></script>
</head>
<body class="m-body flex justify-center items-start px-4 py-10">
    <div class="w-full max-w-2xl">
        <!-- Loading -->
        <div id="loading" class="m-loading">加载中...</div>

        <!-- Main Content (hidden until data loads) -->
        <div id="main-content" class="hidden">
            <!-- Sticky Header: Avatar + Name + Logout + Tabs -->
            <div class="m-profile-header">
                <div class="flex items-center justify-between mb-5">
                    <div class="flex items-center gap-4">
                        <div id="header-avatar"></div>
                        <div>
                            <h1 id="header-username" class="text-xl font-semibold text-slate-900 tracking-tight"></h1>
                            <p class="text-sm text-slate-400 mt-0.5">账号详情</p>
                        </div>
                    </div>
                    <button id="logout-btn" class="m-button-outline" style="width:auto; padding:0.4rem 1rem; font-size:0.75rem;">
                        退出
                    </button>
                </div>

                <!-- Tab Navigation -->
                <div class="m-tabs" id="tab-nav">
                    <button class="m-tab m-tab-active" data-tab="info">基本信息</button>
                    <button class="m-tab" data-tab="security">账号安全</button>
                    <button class="m-tab" data-tab="network">网络信息</button>
                </div>
            </div>

            <!-- Tab Panels inside a single card -->
            <div class="m-card" style="border-top-left-radius:0; border-top-right-radius:0; margin-top:0.75rem;">
                <!-- Panel: 基本信息 -->
                <div id="panel-info" class="m-tab-panel m-tab-panel-active">
                    <div class="m-info-row">
                        <span class="m-info-label">用户名</span>
                        <span id="info-username" class="m-info-value"></span>
                    </div>
                    <div class="m-info-row">
                        <span class="m-info-label">邮箱</span>
                        <span id="info-email" class="m-info-value"></span>
                    </div>
                    <div class="m-info-row">
                        <span class="m-info-label">角色</span>
                        <span id="info-role" class="m-info-value"></span>
                    </div>
                    <div class="m-info-row">
                        <span class="m-info-label">注册时间</span>
                        <span id="info-created" class="m-info-value"></span>
                    </div>
                </div>

                <!-- Panel: 账号安全 -->
                <div id="panel-security" class="m-tab-panel">
                    <!-- OAuth Accounts -->
                    <div id="oauth-section">
                        <div class="m-section-title">关联的第三方账号</div>
                        <div id="oauth-accounts">
                            <p class="text-sm text-slate-400 py-3">暂无关联的第三方账号</p>
                        </div>
                    </div>

                    <div class="my-6 border-t border-slate-100"></div>

                    <!-- Set Password (OAuth user without password) -->
                    <div id="set-password-section" class="hidden">
                        <div class="m-section-title">设置密码</div>
                        <p class="text-xs text-slate-400 mb-4">设置密码后，您可以同时使用邮箱密码和第三方账号登录</p>
                        <form id="set-password-form" class="space-y-4">
                            <div>
                                <label class="text-xs uppercase tracking-widest text-slate-400 mb-1 block">密码</label>
                                <input type="password" id="new-password" class="m-input" placeholder="至少 8 个字符" minlength="8" required>
                            </div>
                            <div>
                                <label class="text-xs uppercase tracking-widest text-slate-400 mb-1 block">确认密码</label>
                                <input type="password" id="confirm-password" class="m-input" placeholder="再次输入密码" minlength="8" required>
                            </div>
                            <button type="submit" class="m-button-primary">设置密码</button>
                        </form>
                    </div>

                    <!-- Password Already Set -->
                    <div id="password-set-section" class="hidden">
                        <div class="m-section-title">账号密码</div>
                        <div class="flex items-center gap-2 text-sm text-slate-600 py-2">
                            <svg class="w-4 h-4 text-green-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <span>已设置密码，支持邮箱密码登录</span>
                        </div>
                    </div>
                </div>

                <!-- Panel: 网络信息 -->
                <div id="panel-network" class="m-tab-panel">
                    <div id="geo-loading" class="m-loading" style="padding:1rem 0;">获取中...</div>
                    <div id="geo-content" class="hidden">
                        <div class="m-info-row">
                            <span class="m-info-label">IP 地址</span>
                            <span id="geo-ip" class="m-info-value"></span>
                        </div>
                        <div class="m-info-row">
                            <span class="m-info-label">国家</span>
                            <span id="geo-country" class="m-info-value"></span>
                        </div>
                        <div class="m-info-row">
                            <span class="m-info-label">城市</span>
                            <span id="geo-city" class="m-info-value"></span>
                        </div>
                        <div class="m-info-row">
                            <span class="m-info-label">时区</span>
                            <span id="geo-timezone" class="m-info-value"></span>
                        </div>
                    </div>
                    <div id="geo-error" class="hidden" style="padding:0.5rem 0;">
                        <button id="geo-retry-btn" class="m-link" style="font-size:0.75rem;">重试</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var accessToken = localStorage.getItem('access_token');
        var refreshToken = localStorage.getItem('refresh_token');

        if (!accessToken) {
            window.location.replace('/login.html');
            throw new Error('redirect');
        }

        var redirecting = false;
        var userDetail = null;

        function handle401() {
            if (redirecting) return;
            redirecting = true;
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.replace('/login.html');
        }

        async function authFetch(url, options) {
            var opts = Object.assign({
                headers: {
                    'Authorization': 'Bearer ' + accessToken,
                    'Accept': 'application/json'
                }
            }, options || {});
            if (options && options.headers) {
                opts.headers = Object.assign({}, opts.headers, options.headers);
                opts.headers['Authorization'] = 'Bearer ' + accessToken;
            }
            var res = await fetch(url, opts);
            if (res.status === 401) {
                handle401();
                throw new Error('unauthorized');
            }
            if (!res.ok) {
                var data = await res.json().catch(function() { return {}; });
                throw new Error(data.detail || 'request_failed');
            }
            return res.json();
        }

        /* ---- Tab switching ---- */
        function initTabs() {
            var tabs = document.querySelectorAll('#tab-nav .m-tab');
            tabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    var target = this.getAttribute('data-tab');
                    // Update tab active state
                    tabs.forEach(function(t) { t.classList.remove('m-tab-active'); });
                    this.classList.add('m-tab-active');
                    // Update panel visibility
                    document.querySelectorAll('.m-tab-panel').forEach(function(p) {
                        p.classList.remove('m-tab-panel-active');
                    });
                    var panel = document.getElementById('panel-' + target);
                    if (panel) panel.classList.add('m-tab-panel-active');
                });
            });
        }

        /* ---- Render header avatar ---- */
        function renderHeaderAvatar(detail) {
            var container = document.getElementById('header-avatar');
            var avatarUrl = null;
            if (detail.oauth_accounts && detail.oauth_accounts.length > 0) {
                for (var i = 0; i < detail.oauth_accounts.length; i++) {
                    if (detail.oauth_accounts[i].provider_avatar_url) {
                        avatarUrl = detail.oauth_accounts[i].provider_avatar_url;
                        break;
                    }
                }
            }
            if (avatarUrl) {
                container.innerHTML = '<img src="' + avatarUrl + '" alt="avatar" class="m-avatar" referrerpolicy="no-referrer">';
            } else {
                var initial = (detail.username || '?').charAt(0).toUpperCase();
                container.innerHTML = '<div class="m-avatar-placeholder">' + initial + '</div>';
            }
        }

        /* ---- Render OAuth accounts ---- */
        function renderOAuthAccounts(accounts) {
            var container = document.getElementById('oauth-accounts');
            if (!accounts || accounts.length === 0) {
                container.innerHTML = '<p class="text-sm text-slate-400 py-3">暂无关联的第三方账号</p>';
                return;
            }
            container.innerHTML = '';
            accounts.forEach(function(oa) {
                var row = document.createElement('div');
                row.className = 'flex items-center gap-3 py-3';
                var providerLabel = oa.provider === 'google' ? 'Google' : oa.provider;
                var avatarHtml = '';
                if (oa.provider_avatar_url) {
                    avatarHtml = '<img src="' + oa.provider_avatar_url + '" alt="avatar" class="w-10 h-10 rounded-full object-cover flex-shrink-0" referrerpolicy="no-referrer">';
                } else {
                    avatarHtml = '<div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center flex-shrink-0"><svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></div>';
                }
                row.innerHTML = avatarHtml +
                    '<div class="min-w-0 flex-1">' +
                    '<div class="text-sm font-medium text-slate-900 truncate">' + (oa.provider_name || providerLabel) + '</div>' +
                    '<div class="text-xs text-slate-400 truncate">' + (oa.provider_email || '-') + '</div>' +
                    '</div>' +
                    '<span class="text-xs text-slate-400 flex-shrink-0">' + providerLabel + '</span>';
                container.appendChild(row);
            });
        }

        /* ---- Render password section ---- */
        function renderPasswordSection(hasPassword, hasOAuth) {
            var setSection = document.getElementById('set-password-section');
            var doneSection = document.getElementById('password-set-section');
            if (hasOAuth && !hasPassword) {
                setSection.classList.remove('hidden');
                doneSection.classList.add('hidden');
            } else if (hasOAuth && hasPassword) {
                setSection.classList.add('hidden');
                doneSection.classList.remove('hidden');
            } else {
                setSection.classList.add('hidden');
                doneSection.classList.add('hidden');
            }
        }

        /* ---- Load user info ---- */
        async function loadUserInfo() {
            var loading = document.getElementById('loading');
            var mainContent = document.getElementById('main-content');
            loading.classList.remove('hidden');
            mainContent.classList.add('hidden');

            try {
                userDetail = await authFetch('/users/me/detail');
                document.getElementById('header-username').textContent = userDetail.username;
                renderHeaderAvatar(userDetail);

                document.getElementById('info-username').textContent = userDetail.username;
                document.getElementById('info-email').textContent = userDetail.email;
                document.getElementById('info-role').textContent = userDetail.role;
                document.getElementById('info-created').textContent = userDetail.created_at;

                renderOAuthAccounts(userDetail.oauth_accounts);
                renderPasswordSection(userDetail.has_password, userDetail.oauth_accounts && userDetail.oauth_accounts.length > 0);

                loading.classList.add('hidden');
                mainContent.classList.remove('hidden');
                loadGeoInfo();
            } catch (err) {
                if (err.message !== 'unauthorized') {
                    loading.classList.add('hidden');
                    showAlert('获取用户信息失败', 'error');
                }
            }
        }

        /* ---- Load geo info ---- */
        async function loadGeoInfo() {
            var geoLoading = document.getElementById('geo-loading');
            var geoContent = document.getElementById('geo-content');
            var geoError = document.getElementById('geo-error');
            geoLoading.classList.remove('hidden');
            geoContent.classList.add('hidden');
            geoError.classList.add('hidden');

            try {
                var geo = await authFetch('/users/me/geo');
                document.getElementById('geo-ip').textContent = geo.ip || '-';
                document.getElementById('geo-country').textContent = geo.country || '-';
                document.getElementById('geo-city').textContent = geo.city || '-';
                document.getElementById('geo-timezone').textContent = geo.timezone || '-';
                geoLoading.classList.add('hidden');
                geoContent.classList.remove('hidden');
            } catch (err) {
                if (err.message !== 'unauthorized') {
                    geoLoading.classList.add('hidden');
                    showAlert('获取地理位置失败', 'error');
                    geoError.classList.remove('hidden');
                }
            }
        }

        /* ---- Event listeners ---- */
        document.getElementById('geo-retry-btn').addEventListener('click', loadGeoInfo);

        document.getElementById('set-password-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var pw = document.getElementById('new-password').value;
            var cpw = document.getElementById('confirm-password').value;
            if (pw.length < 8) {
                showAlert('密码长度至少为 8 个字符', 'error');
                return;
            }
            if (pw !== cpw) {
                showAlert('两次输入的密码不一致', 'error');
                return;
            }
            var btn = this.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = '设置中...';
            try {
                await authFetch('/users/me/password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pw })
                });
                showAlert('密码设置成功', 'success');
                renderPasswordSection(true, true);
            } catch (err) {
                if (err.message !== 'unauthorized') {
                    showAlert(err.message || '设置密码失败', 'error');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = '设置密码';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async function() {
            var btn = this;
            btn.disabled = true;
            btn.textContent = '退出中...';
            try {
                await fetch('/auth/logout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + accessToken
                    },
                    body: JSON.stringify({ access_token: accessToken, refresh_token: refreshToken })
                });
            } catch (e) {}
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.replace('/login.html');
        });

        initTabs();
        loadUserInfo();
    </script>
</body>
</html>
