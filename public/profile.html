<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - Cloudflare Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles/common.css">
    <script src="/scripts/alert.js"></script>
</head>
<body class="m-body flex justify-center items-start px-4 py-10">
    <div class="w-full max-w-2xl">
        <!-- Loading -->
        <div id="loading" class="m-loading">加载中...</div>

        <!-- Main Content (hidden until data loads) -->
        <div id="main-content" class="hidden">
            <!-- Sticky Header: Avatar + Name + Logout + Tabs -->
            <div class="m-profile-header">
                <div class="flex items-center justify-between mb-5">
                    <div class="flex items-center gap-4">
                        <div id="header-avatar"></div>
                        <div>
                            <h1 id="header-username" class="text-xl font-semibold text-slate-900 tracking-tight"></h1>
                            <p class="text-sm text-slate-400 mt-0.5">账号详情</p>
                        </div>
                    </div>
                    <button id="logout-btn" class="m-button-outline" style="width:auto; padding:0.4rem 1rem; font-size:0.75rem;">
                        退出
                    </button>
                </div>

                <!-- Tab Navigation -->
                <div class="m-tabs" id="tab-nav">
                    <button class="m-tab m-tab-active" data-tab="info">基本信息</button>
                    <button class="m-tab" data-tab="security">账号安全</button>
                    <button class="m-tab" data-tab="network">网络信息</button>
                </div>
            </div>

            <!-- Tab Panels inside a single card -->
            <div class="m-card" style="border-top-left-radius:0; border-top-right-radius:0; margin-top:0.75rem;">
                <!-- Panel: 基本信息 -->
                <div id="panel-info" class="m-tab-panel m-tab-panel-active">
                    <div class="m-info-row">
                        <span class="m-info-label">用户名</span>
                        <span id="info-username" class="m-info-value"></span>
                    </div>
                    <div class="m-info-row">
                        <span class="m-info-label">邮箱</span>
                        <span id="info-email" class="m-info-value"></span>
                    </div>
                    <div class="m-info-row">
                        <span class="m-info-label">角色</span>
                        <span id="info-role" class="m-info-value"></span>
                    </div>
                    <div class="m-info-row">
                        <span class="m-info-label">注册时间</span>
                        <span id="info-created" class="m-info-value"></span>
                    </div>
                </div>

                <!-- Panel: 账号安全 -->
                <div id="panel-security" class="m-tab-panel">
                    <!-- OAuth Accounts -->
                    <div id="oauth-section">
                        <div class="m-section-title">关联的第三方账号</div>
                        <div id="oauth-accounts">
                            <p class="text-sm text-slate-400 py-3">暂无关联的第三方账号</p>
                        </div>
                    </div>

                    <div class="my-6 border-t border-slate-100"></div>

                    <!-- Set Password (OAuth user without password) -->
                    <div id="set-password-section" class="hidden">
                        <div class="m-section-title">设置密码</div>
                        <p class="text-xs text-slate-400 mb-4">设置密码后，您可以同时使用邮箱密码和第三方账号登录</p>
                        <form id="set-password-form" class="space-y-4">
                            <div>
                                <label class="text-xs uppercase tracking-widest text-slate-400 mb-1 block">密码</label>
                                <input type="password" id="new-password" class="m-input" placeholder="至少 8 个字符" minlength="8" required>
                            </div>
                            <div>
                                <label class="text-xs uppercase tracking-widest text-slate-400 mb-1 block">确认密码</label>
                                <input type="password" id="confirm-password" class="m-input" placeholder="再次输入密码" minlength="8" required>
                            </div>
                            <button type="submit" class="m-button-primary">设置密码</button>
                        </form>
                    </div>

                    <!-- Password Already Set -->
                    <div id="password-set-section" class="hidden">
                        <div class="m-section-title">账号密码</div>
                        <div class="flex items-center gap-2 text-sm text-slate-600 py-2">
                            <svg class="w-4 h-4 text-green-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <span>已设置密码，支持邮箱密码登录</span>
                        </div>
                    </div>
                </div>

                <!-- Panel: 网络信息 -->
                <div id="panel-network" class="m-tab-panel">
                    <div id="geo-loading" class="m-loading" style="padding:1rem 0;">获取中...</div>
                    <div id="geo-content" class="hidden">
                        <div class="m-info-row">
                            <span class="m-info-label">IP 地址</span>
                            <span id="geo-ip" class="m-info-value"></span>
                        </div>
                        <div class="m-info-row">
                            <span class="m-info-label">国家</span>
                            <span id="geo-country" class="m-info-value"></span>
                        </div>
                        <div class="m-info-row">
                            <span class="m-info-label">城市</span>
                            <span id="geo-city" class="m-info-value"></span>
                        </div>
                        <div class="m-info-row">
                            <span class="m-info-label">时区</span>
                            <span id="geo-timezone" class="m-info-value"></span>
                        </div>
                    </div>
                    <div id="geo-error" class="hidden" style="padding:0.5rem 0;">
                        <button id="geo-retry-btn" class="m-link" style="font-size:0.75rem;">重试</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/scripts/profile.js"></script>
</body>
</html>
